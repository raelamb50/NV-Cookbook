<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Natalie's Favorite Recipes — {{CATEGORY}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            .recipe { page-break-after: always; }
            .recipe:last-child { page-break-after: avoid; }
            body { margin: 0; }
        }
        body {
            font-family: 'Lato', Georgia, serif;
            color: #333;
            max-width: 7.5in;
            margin: 0 auto;
            padding: 0.5in;
        }
        .recipe {
            padding: 0.25in 0;
        }
        .recipe-header {
            border-bottom: 2px solid #8B0000;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .recipe-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 24px;
            font-weight: bold;
            color: #8B0000;
            margin: 0;
        }
        .recipe-meta {
            display: flex;
            gap: 32px;
            margin: 12px 0;
            font-size: 14px;
            background: #f9f5f0;
            padding: 8px 12px;
            border-radius: 4px;
        }
        .meta-item { display: flex; gap: 6px; }
        .meta-label { font-weight: bold; }
        h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 18px;
            color: #8B0000;
            margin: 20px 0 8px 0;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }
        .ingredients ul {
            list-style: disc;
            padding-left: 24px;
            margin: 0;
        }
        .ingredients li {
            font-size: 14px;
            line-height: 1.7;
        }
        .directions ol {
            padding-left: 24px;
            margin: 0;
        }
        .directions li {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 8px;
        }
        .recipe-footer {
            margin-top: 28px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .recipe-source {
            font-size: 11px;
            font-style: italic;
            color: #999;
        }
        .cookbook-stamp {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 11px;
            color: #8B0000;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        h1.section-title {
            font-family: 'Playfair Display', Georgia, serif;
            text-align: center;
            font-size: 32px;
            color: #8B0000;
            border-bottom: 3px solid #8B0000;
            padding-bottom: 12px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<h1 class="section-title">{{CATEGORY}}</h1>

<!-- Recipe -->
<div class="recipe">
    <div class="recipe-header">
        <p class="recipe-title">{{RECIPE TITLE}}</p>
    </div>

    <div class="recipe-meta">
        <div class="meta-item"><span class="meta-label">Prep:</span> {{PREP TIME}}</div>
        <div class="meta-item"><span class="meta-label">Cook:</span> {{COOK TIME}}</div>
        <div class="meta-item"><span class="meta-label">Level:</span> {{LEVEL}}</div>
        <div class="meta-item"><span class="meta-label">Serves:</span> {{SERVINGS}}</div>
    </div>

    <div class="ingredients">
        <h2>Ingredients</h2>
        <ul>
            <li>{{INGREDIENT}}</li>
        </ul>
    </div>

    <div class="directions">
        <h2>Directions</h2>
        <ol>
            <li>{{STEP}}</li>
        </ol>
    </div>

    <div class="recipe-footer">
        <span class="recipe-source">{{SOURCE}}</span>
        <span class="cookbook-stamp">Natalie's Favorite Recipes</span>
    </div>
</div>

</body>
</html>
